# Yerel geliştirme: API + MongoDB
# Başlat: docker compose up -d

services:
  mongo:
    image: mongo:7
    container_name: focusnet-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: focusnet-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/focusnet
      JWT_SECRET: docker-dev-secret-degistir
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
